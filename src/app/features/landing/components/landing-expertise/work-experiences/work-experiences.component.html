<div class="works-wrapper">
  <p-timeline [value]="works()" align="left">
    <ng-template #marker let-work>
      <span class="flex w-8 h-8 items-center justify-center rounded-full z-10 bg-white">
        <!--<i [class]="event.icon"></i>-->
        <img src="../../../../../../assets/icons/briefcase.svg" alt="" class="w-5">
      </span>
    </ng-template>
    <ng-template #content let-work>
      <div class="work-content flex flex-col items-start justify-center w-full mt-2 mb-2">
        <div class="flex flex-col items-start justify-between w-full">
          <div>
            <div class="content-period">
              <p>{{work.start_date | date:'MMM yyyy'}}</p>
              <span>-</span>
              <p>{{work.end_date | date:'MMM yyyy'}}</p>
            </div>
            <h4 class="content-degree">{{work.title}}</h4>
            <p class="font-semibold">{{work.company}}</p>
          </div>
        </div>
        <div class="content-achievements flex flex-col items-start justify-start gap-3 mt-2 mb-2">
            @for (achievement of work.achievements; track $index) {
              <p>- {{achievement.description}}</p>
            }
        </div>
        <div class="flex items-center justify-start gap-3 overflow-x-scroll max-sm:w-64">
          @for (item of work.environment; track $index) {
            <span class="rounded-full bg-white pb-2 pt-2 pl-3 pr-3">{{item.name}}</span>
          }
        </div>
      </div>
    </ng-template>
  </p-timeline>
</div>

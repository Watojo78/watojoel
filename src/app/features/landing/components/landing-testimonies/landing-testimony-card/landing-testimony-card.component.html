<div class="testimony-card rounded-3xl shadow flex flex-grow">
  <div class="testimony-card-message ">
    <p>{{testimony().quote}}</p>
    <p-rating [(ngModel)]="testimony().rating" [stars]="5" [readonly]="true" />
  </div>
  <p-divider class="my-2" />
  <div class="testimony-card-profile">
    <div class="role-name">
    <h4 class="title">{{testimony().authorRole}}</h4>
      <span class="fullname">{{testimony().authorName}}</span>
    </div>
    <img [src]="testimony().authorAvatar" alt="testimony-profile-sample" height="56">
  </div>
</div>
